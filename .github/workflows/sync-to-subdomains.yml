name: 🔄 Sync PitayaCore → All Subdomains (v11 Audit)

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'docs/**'
      - '.agent/**'
  repository_dispatch:
    types: [ core-updated-by-subdomain ]

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [api.batidospitaya, erp.batidospitaya, talento.batidospitaya]
    steps:
      - name: 🚀 1. Checkout
        uses: actions/checkout@v4

      - name: 🛡️ 2. Dispatch Inteligente (Anti-Circular v11)
        if: "!contains(github.event.head_commit.message, matrix.repo)"
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          repository: MiguelGotea/${{ matrix.repo }}
          event-type: pitayacore-sync
          client_payload: '{"sha": "${{ github.sha }}"}'

      - name: 🔬 3. AuditorÃ­a de DecisiÃ³n (Filtro v11)
        run: |
          MSG="${{ github.event.head_commit.message }}"
          REPO="${{ matrix.repo }}"
          if [[ "$MSG" == *"$REPO"* ]]; then
            echo "⏭️ OMITIENDO envío a $REPO: Cambio detectado como origen propio."
          else
            echo "✅ ENVIANDO a $REPO: Mensaje limpio de filtros de origen."
            echo "�� SHA: ${{ github.sha }}"
          fi
