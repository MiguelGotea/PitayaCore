name: 🔄 Sync PitayaCore → All Subdomains

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'docs/**'
      - '.agent/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - "erp.batidospitaya.com"
          - "api.batidospitaya.com"
          - "talento.batidospitaya.com"

    steps:
      - name: 🚀 Dispatch a ${{ matrix.repo }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          repository: MiguelGotea/${{ matrix.repo }}
          event-type: pitayacore-sync
          client-payload: |
            {
              "sha": "${{ github.sha }}",
              "triggered_by": "PitayaCore"
            }
