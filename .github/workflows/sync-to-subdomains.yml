name: 🔄 Sync PitayaCore → All Subdomains (v13.1 Checksum)

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'docs/**'
      - '.agent/**'
  repository_dispatch:
    types: [ force-sync ]

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        repo: [api.batidospitaya, erp.batidospitaya, talento.batidospitaya]
    steps:
      - name: 🚀 1. Checkout Master (PitayaCore)
        uses: actions/checkout@v4

      - name: 🛡️ 2. Filtro Anti-Circular (v13.1)
        id: filter
        env:
          MSG: ${{ github.event.head_commit.message || 'Dispatch Force Sync' }}
          REPRO: ${{ matrix.repo }}
        run: |
          CLEAN_MSG=$(echo "$MSG" | tr -d '\n\r' | sed 's/[^a-zA-Z0-9. ]/ /g')
          if echo "$CLEAN_MSG" | grep -q "$REPRO"; then
            echo "SKIP=true" >> $GITHUB_ENV
            echo "⏭️ OMITIENDO: Identificado como origen ($REPRO)."
          else
            echo "SKIP=false" >> $GITHUB_ENV
            echo "✅ PROCESANDO inyección para $REPRO."
          fi

      - name: 🏗️ 3. Inyección Directa por Checksum en ${{ matrix.repo }}
        if: ${{ env.SKIP == 'false' }}
        run: |
          # 3.1 Clonamos el subdominio
          git clone https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/MiguelGotea/${{ matrix.repo }}.git _target
          
          # 3.2 Sincronización física por CONTENIDO (Checksum total)
          # -r: recursivo, -v: verbose, -h: human readable, -c: CHECKSUM
          rsync -rvhc --delete ./core/   _target/core/
          rsync -rvhc --delete ./docs/   _target/docs/
          rsync -rvhc --delete .agent/   _target/.agent/
          
          # 3.3 Commit y Push Directo
          cd _target
          git config user.name "Mano de Hierro Bot"
          git config user.email "bot@batidospitaya.com"
          git add core/ docs/ .agent/
          
          echo "🔍 LOG DE CAMBIOS DETECTADOS:"
          git status
          
          if ! git diff --staged --quiet; then
            git commit -m "chore(core): sync v13.1 (checksum update from PitayaCore)"
            git push origin main
            echo "✅ INYECCIÓN COMPLETADA en ${{ matrix.repo }}"
          else
            echo "⏭️ NADA QUE INYECTAR en ${{ matrix.repo }} (Ya estaba al día según checksum)"
          fi
