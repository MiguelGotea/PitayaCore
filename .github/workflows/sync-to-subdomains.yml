name: 🔄 Sync PitayaCore → All Subdomains

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'docs/**'
      - '.agent/**'
  repository_dispatch:
    types: [ core-updated-by-subdomain ]

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [api.batidospitaya, erp.batidospitaya, talento.batidospitaya]
    steps:
      - name: 🚀 1. Checkout
        uses: actions/checkout@v4

      - name: 🛡️ 2. Dispatch Inteligente (Anti-Circular v10)
        # Si el mensaje del commit contiene el nombre del repo del matrix, OMITIRLO.
        if: "!contains(github.event.head_commit.message, matrix.repo)"
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          repository: MiguelGotea/${{ matrix.repo }}
          event-type: pitayacore-sync
          client_payload: '{"sha": "${{ github.sha }}"}'

      - name: 📢 3. Log del Dispatch
        if: "!contains(github.event.head_commit.message, matrix.repo)"
        run: |
          echo "🌐 Enviado a: MiguelGotea/${{ matrix.repo }}"
          echo "🆔 SHA enviado: ${{ github.sha }}"

      - name: ⏭️ 4. Log de OmisiÃ³n (Filtro de Origen)
        if: "contains(github.event.head_commit.message, matrix.repo)"
        run: |
          echo "⏭️ OMITIENDO dispatch a ${{ matrix.repo }} porque es el ORIGEN del cambio."
