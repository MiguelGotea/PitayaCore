name: 🔄 Sync PitayaCore → All Subdomains (v12.3)

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'docs/**'
      - '.agent/**'
  repository_dispatch:
    types: [ force-sync, pitayacore-sync ]

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [api.batidospitaya, erp.batidospitaya, talento.batidospitaya]
    steps:
      - name: 🚀 1. Checkout
        uses: actions/checkout@v4

      - name: 🛡️ 2. Filtro Anti-Circular (v12.3 Robust)
        id: filter
        env:
          MSG: ${{ github.event.head_commit.message || 'Dispatch Force Sync' }}
          REPRO: ${{ matrix.repo }}
        run: |
          # Limpiamos el mensaje de caracteres especiales y comparamos
          CLEAN_MSG=$(echo "$MSG" | tr -d '\n\r' | sed 's/[^a-zA-Z0-9. ]/ /g')
          if echo "$CLEAN_MSG" | grep -q "$REPRO"; then
            echo "SKIP=true" >> $GITHUB_ENV
            echo "⏭️ OMITIENDO: Cambio detectado como origen propio ($REPRO)."
          else
            echo "SKIP=false" >> $GITHUB_ENV
            echo "✅ ENVIANDO: Mensaje libre de loops para $REPRO."
          fi

      - name: 🚀 3. Dispatch a ${{ matrix.repo }}
        if: ${{ env.SKIP == 'false' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          repository: MiguelGotea/${{ matrix.repo }}
          event-type: pitayacore-sync
          client-payload: '{"sha": "${{ github.sha }}"}'
